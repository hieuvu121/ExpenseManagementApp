# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: expensphie_backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      #down+config env java on runner githubaction
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn -B test -Dspring.profiles.active=test
      #compose to jar file, ready to deploy and run 
      - name: Build JAR
        run: mvn -B package -DskipTests

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: expensphie_backend/target/surefire-reports/

      - name: Upload built JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: expensphie_backend/target/*.jar

      - name: Update dependency graph
        if: github.event_name == 'push'
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
        with:
            directory: expensphie_backend

      #build image and push to docker hub 
      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./expensphie_backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/expensemanagementapp-backend:latest

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Backend-1
        if: github.event_name == 'push'
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_1_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands=["cd /home/ssm-user/expensphie && docker-compose -f docker-compose.backend.yml pull && docker-compose -f docker-compose.backend.yml up -d --no-deps backend"]

      - name: Wait for Backend-1
        if: github.event_name == 'push'
        run: sleep 30

      - name: Deploy to Backend-2
        if: github.event_name == 'push'
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands=["cd /home/ssm-user/expensphie && docker-compose -f docker-compose.backend.yml pull && docker-compose -f docker-compose.backend.yml up -d --no-deps backend"]
        
