# Force in-memory database for repository tests
spring.datasource.url=jdbc:h2:mem:expensphie_testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Deterministic schema lifecycle for isolated test runs
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Ensure test slices prefer embedded DB if any external datasource is present
spring.test.database.replace=any

# Required by UserService for activation links
jwt.secret=test-secret-key-for-ci-at-least-32-characters
app.cors.allowed-origins=*
app.base-url=http://localhost:8080

spring.ai.google.genai.api-key=test-key
spring.ai.openai.api-key=test-key

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
